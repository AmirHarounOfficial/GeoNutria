version: '3.8'

services:
  # Database - PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: geonutria-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: geonutria_main
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - geonutria-network

  # Database - TimescaleDB (IoT)
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: geonutria-timescale
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    volumes:
      - tsdata:/var/lib/postgresql/data
    networks:
      - geonutria-network

  # Cache & Locks
  redis:
    image: redis:7-alpine
    container_name: geonutria-redis
    ports:
      - "6379:6379"
    networks:
      - geonutria-network

  # Messaging - RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management
    container_name: geonutria-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - geonutria-network

  # Messaging - Kafka (using KRaft mode for simplicity)
  kafka:
    image: bitnami/kafka:3.7-debian-12
    container_name: geonutria-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
    networks:
      - geonutria-network

  # Storage - MinIO (S3 Compatible)
  minio:
    image: minio/minio
    container_name: geonutria-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - geonutria-network

  # API Gateway - Kong (Standalone Database-less mode for now)
  kong:
    image: kong:3.6
    container_name: geonutria-gateway
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PROXY_LISTEN: 0.0.0.0:8000
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./gateway/kong.yml:/usr/local/kong/declarative/kong.yml
    networks:
      - geonutria-network

networks:
  geonutria-network:
    driver: bridge

volumes:
  pgdata:
  tsdata:
  minio_data:
